<!DOCTYPE html>
<html>
<head>
    <title>Patient Login</title>
    <link rel="stylesheet" href="/static/style.css">

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#2e7bd6,#5fa8ff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:10px;
    width:320px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    text-align:center;
}

.login-box h2{
    margin-bottom:25px;
    color:#1f5fbf;
}

label{
    display:block;
    text-align:left;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    background:#1f5fbf;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#174a96;
}

a{
    text-decoration:none;
    color:#1f5fbf;
}

.back{
    display:block;
    margin-top:15px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Patient Login</h2>

<form method="POST">

<label>Phone Number</label>
<input type="text" name="phone" placeholder="Enter your phone number" required>

<label>Password</label>
<input type="password" name="phone" placeholder="Enter your password" required>


<button type="submit">Login</button>

</form>

<p>New patient? <a href="register_patient.html">Create an account</a></p>

<a class="back" href="index.html">⬅ Back to Home</a>

</div>

</body>
</html>
