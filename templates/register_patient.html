<!DOCTYPE html>
<html>
<head>
<title>Patient Registration</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#2e7bd6,#5fa8ff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.register-box{
    background:#f5f7fb;
    padding:35px 40px;
    width:360px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.25);
    text-align:center;
}

.register-box h2{
    margin-bottom:25px;
    color:#1f5fbf;
    font-weight:600;
}

label{
    font-weight:bold;
    display:block;
    margin:10px 0 5px;
    text-align:left;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

input:focus{
    border-color:#1f5fbf;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#1f5fbf;
    border:none;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#174a96;
}

.login-link{
    margin-top:15px;
    font-size:14px;
}

.login-link a{
    text-decoration:none;
    color:#1f5fbf;
    font-weight:500;
}

.login-link a:hover{
    text-decoration:underline;
}

.error{
    color:red;
    font-size:13px;
    text-align:left;
    margin-bottom:5px;
}

</style>

<script>
function validatePassword() {

    var password = document.getElementById("password").value;
    var confirmPassword = document.getElementById("confirm_password").value;
    var error = document.getElementById("error");

    if(password !== confirmPassword){
        error.innerHTML = "Passwords do not match!";
        return false;
    }

    error.innerHTML = "";
    return true;
}
</script>

</head>

<body>

<div class="register-box">

<h2>Patient Registration</h2>

<form method="POST" onsubmit="return validatePassword()">

<label>User ID</label>
<input type="text" name="user_id" placeholder="Enter your User ID" required>

<label>Full Name</label>
<input type="text" name="name" placeholder="Enter your Full Name" required>

<label>Phone Number</label>
<input type="text" name="phone" placeholder="Enter your Phone Number" required>

<label>Password</label>
<input type="password" id="password" name="password" placeholder="Enter your Password" required>

<label>Re-Enter Password</label>
<input type="password" id="confirm_password" placeholder="Re-Enter Password" required>

<div id="error" class="error"></div>

<button type="submit">Register</button>

</form>

<div class="login-link">
Already registered? <br>
<a href="login_patient.html">Login</a>
</div>

</div>

</body>
</html>
