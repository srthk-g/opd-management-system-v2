<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#F4F8FC;
}

/* Header */
.header{
    background:#0B5ED7;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h2{
    font-weight:600;
}

.logout{
    background:#20C997;
    border:none;
    padding:8px 15px;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.logout:hover{
    background:#17A589;
}

/* Container */
.container{
    padding:30px;
}

/* Top bar */
.top-bar{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.search{
    padding:10px;
    width:250px;
    border-radius:6px;
    border:1px solid #ccc;
}

.add-btn{
    padding:10px 15px;
    background:#20C997;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.add-btn:hover{
    background:#17A589;
}

/* Table */
.table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.table th, .table td{
    padding:15px;
    text-align:left;
}

.table th{
    background:#0B5ED7;
    color:white;
}

.table tr:nth-child(even){
    background:#f2f6fb;
}

/* Status badges */
.status{
    padding:5px 10px;
    border-radius:15px;
    font-size:12px;
    color:white;
}

.in-stock{ background:#20C997; }
.low-stock{ background:#FFC107; color:black; }
.out-stock{ background:#DC3545; }

</style>

</head>

<body>

<div class="header">
<h2>💊 Inventory Dashboard</h2>
<button class="logout" onclick="window.location.href='index.html'">Logout</button>
</div>

<div class="container">

<div class="top-bar">
<input class="search" type="text" placeholder="Search medicine...">
<button class="add-btn">+ Add Item</button>
</div>

<table class="table">
<tr>
<th>ID</th>
<th>Medicine Name</th>
<th>Quantity</th>
<th>Status</th>
</tr>

<tr>
<td>101</td>
<td>Paracetamol</td>
<td>120</td>
<td><span class="status in-stock">In Stock</span></td>
</tr>

<tr>
<td>102</td>
<td>Amoxicillin</td>
<td>20</td>
<td><span class="status low-stock">Low Stock</span></td>
</tr>

<tr>
<td>103</td>
<td>Insulin</td>
<td>0</td>
<td><span class="status out-stock">Out of Stock</span></td>
</tr>

</table>

</div>

</body>
</html>
